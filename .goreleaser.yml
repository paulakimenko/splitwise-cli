version: 2

project_name: splitwise

before:
  hooks:
    - go mod tidy

builds:
  - id: splitwise
    binary: splitwise
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/barronlroth/splitwise-cli/cmd.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

brews:
  - name: splitwise
    repository:
      owner: barronlroth
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/barronlroth/splitwise-cli"
    description: "A command-line interface for Splitwise"
    license: "MIT"
    install: |
      bin.install "splitwise"
    test: |
      system "#{bin}/splitwise", "--version"

release:
  github:
    owner: barronlroth
    name: splitwise-cli
